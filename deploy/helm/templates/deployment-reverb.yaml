{{- if .Values.reverb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maya-dashboard.fullname" . }}-reverb
  labels:
    {{- include "maya-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: reverb
spec:
  replicas: {{ .Values.reverb.replicas }}
  strategy:
    type: Recreate                 # singleton WS (salvo scaling con Redis)
  selector:
    matchLabels:
      {{- include "maya-dashboard.componentSelector" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "reverb") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maya-dashboard.componentSelector" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "reverb") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.reverb.terminationGracePeriodSeconds }}
      containers:
        - name: reverb
          image: {{ include "maya-dashboard.image" (dict "root" . "name" .Values.image.backend.name) }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args: ["reverb"]
          env:
            - name: CONTAINER_ROLE
              value: reverb
          envFrom:
            {{- include "maya-dashboard.envFrom" . | nindent 12 }}
          ports:
            - name: ws
              containerPort: {{ .Values.reverb.containerPort }}
          livenessProbe:
            tcpSocket: { port: ws }
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            tcpSocket: { port: ws }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources: {{- toYaml .Values.reverb.resources | nindent 12 }}
          volumeMounts:
            {{- include "maya-dashboard.writableVolumeMounts" . | nindent 12 }}
            - name: run
              mountPath: /run
      volumes:
        {{- include "maya-dashboard.writableVolumes" . | nindent 8 }}
        - name: run
          emptyDir: {}
{{- end }}
