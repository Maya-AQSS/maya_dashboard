{{- /*
  Plantilla DEFENSIVA del Secret. NUNCA se crean valores reales aquí; el chart
  comprueba que el Secret externo exista (gestionado vía `kubectl create secret`,
  Sealed Secrets o External Secrets). Renderiza un stub sólo si se le pide
  explícitamente con `--set secret.createStub=true` para pruebas.
*/ -}}
{{- if .Values.secret.createStub -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels: {{- include "maya-dashboard.labels" . | nindent 4 }}
  annotations:
    maya.ceedcv.es/stub: "true"
    maya.ceedcv.es/warning: "PLACEHOLDERS — sustituir antes de helm upgrade real"
type: Opaque
stringData:
  APP_KEY: "base64:REPLACE_WITH_REAL_KEY"
  DB_USERNAME: "REPLACE"
  DB_PASSWORD: "REPLACE"
  REDIS_PASSWORD: "REPLACE"
  RABBITMQ_PASSWORD: "REPLACE"
  KEYCLOAK_CLIENT_SECRET: "REPLACE"
  REVERB_APP_KEY: "REPLACE"
  REVERB_APP_SECRET: "REPLACE"
  LOG_MGMT_DB_PASSWORD: "REPLACE"
{{- end }}
