{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maya-dashboard.fullname" . }}-worker
  labels:
    {{- include "maya-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  strategy:
    type: Recreate                 # singleton: nunca dos consumers concurrentes
  selector:
    matchLabels:
      {{- include "maya-dashboard.componentSelector" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "maya-dashboard.componentSelector" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "worker") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.worker.terminationGracePeriodSeconds | default 120 }}
      containers:
        - name: worker
          image: {{ include "maya-dashboard.image" (dict "root" . "name" .Values.image.backend.name) }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args: ["worker"]
          env:
            - name: CONTAINER_ROLE
              value: worker
            - name: LOG_STACK
              value: {{ .Values.worker.logStack | quote }}
          envFrom:
            {{- include "maya-dashboard.envFrom" . | nindent 12 }}
          resources: {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            {{- include "maya-dashboard.writableVolumeMounts" . | nindent 12 }}
            - name: run
              mountPath: /run
      volumes:
        {{- include "maya-dashboard.writableVolumes" . | nindent 8 }}
        - name: run
          emptyDir: {}
{{- end }}
