services:

  # ─── Backend (Laravel) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maya_dashboard_backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://maya_dashboard_api.localhost}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dashboard}
      DB_USERNAME: ${DB_USERNAME:-maya}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://maya_auth_keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-maya}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-maya-dashboard-backend}
      JWKS_URL: ${JWKS_URL:-http://maya_auth_keycloak:8080/realms/maya/protocol/openid-connect/certs}
      JWT_ISSUER: ${JWT_ISSUER:-http://keycloak.localhost/realms/maya}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MAYA_MESSAGING_APP: maya_dashboard
      LOG_STACK: "daily,rabbit"
      LOG_RABBIT_LEVEL: warning
      LOG_MGMT_DB_HOST: maya_infra_postgres
      LOG_MGMT_DB_DATABASE: ${LOG_MGMT_DB_DATABASE:-log_mgmt_db}
      LOG_MGMT_DB_USERNAME: ${LOG_MGMT_DB_USERNAME:-log_mgmt_user}
      LOG_MGMT_DB_PASSWORD: ${LOG_MGMT_DB_PASSWORD:-secret}
    volumes:
      - ./backend:/var/www/html
      - ../maya_infra/packages:/var/maya_infra/packages
    ports:
      - "${BACKEND_PORT:-8003}:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maya-dashboard-api.rule=Host(`maya_dashboard_api.localhost`)"
      - "traefik.http.routers.maya-dashboard-api.entrypoints=web"
      - "traefik.http.services.maya-dashboard-api.loadbalancer.server.port=8000"
    networks:
      - maya_network

  # ─── Worker: consumers AMQP (notifications.ingest + alerts.ingest) ───
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maya_dashboard_worker
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dashboard}
      DB_USERNAME: ${DB_USERNAME:-maya}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      MAYA_MESSAGING_APP: maya_dashboard
      LOG_MGMT_DB_HOST: maya_infra_postgres
      LOG_MGMT_DB_DATABASE: ${LOG_MGMT_DB_DATABASE:-log_mgmt_db}
      LOG_MGMT_DB_USERNAME: ${LOG_MGMT_DB_USERNAME:-log_mgmt_user}
      LOG_MGMT_DB_PASSWORD: ${LOG_MGMT_DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      WORKER_LABEL: "[worker]"
      WORKER_WAIT_MIGRATION: create_notifications_table
      WORKER_PATCH_CONSUMER: "1"
      WORKER_CONSUMERS: "notifications:consume alerts:consume"
    entrypoint: ["/maya_infra/scripts/worker-entrypoint.sh"]
    command: []
    volumes:
      - ./backend:/var/www/html
      - ../maya_infra/packages:/var/maya_infra/packages
      - ../maya_infra/scripts:/maya_infra/scripts:ro
    networks:
      - maya_network

  # ─── Scheduler: runs `php artisan schedule:run` every minute ────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maya_dashboard_scheduler
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: maya_infra_postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-maya_dashboard}
      DB_USERNAME: ${DB_USERNAME:-maya}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: redis
      REDIS_HOST: maya_redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret}
      REDIS_PORT: 6379
      RABBITMQ_HOST: ${RABBITMQ_HOST:-maya_rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
      MAYA_MESSAGING_APP: maya_dashboard
      LOG_MGMT_DB_HOST: maya_infra_postgres
      LOG_MGMT_DB_DATABASE: ${LOG_MGMT_DB_DATABASE:-log_mgmt_db}
      LOG_MGMT_DB_USERNAME: ${LOG_MGMT_DB_USERNAME:-log_mgmt_user}
      LOG_MGMT_DB_PASSWORD: ${LOG_MGMT_DB_PASSWORD:-secret}
    entrypoint:
      - /bin/sh
      - -c
      - |
        cd /var/www/html
        if [ ! -f vendor/autoload.php ]; then
          echo "[scheduler] waiting for vendor (backend composer install)..."
          while [ ! -f vendor/autoload.php ]; do sleep 3; done
        fi
        until php artisan migrate:status --no-interaction 2>/dev/null | grep -q "create_alert_rules_table"; do
          echo "[scheduler] waiting for migrations..."
          sleep 3
        done
        echo "[scheduler] ready — ticking schedule:run every 60s"
        while true; do
          php artisan schedule:run --no-interaction || true
          sleep 60
        done
    command: []
    volumes:
      - ./backend:/var/www/html
      - ../maya_infra/packages:/var/maya_infra/packages
    networks:
      - maya_network

  # ─── Frontend (React 19 + Vite 8) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: maya_dashboard_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://maya_dashboard_api.localhost}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://keycloak.localhost}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-maya}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-maya-dashboard}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - ../maya_infra/packages:/maya_infra/packages
      - ../maya_infra/configs:/maya_infra/configs:ro
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5175}:5173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maya-dashboard-front.rule=Host(`maya_dashboard.localhost`)"
      - "traefik.http.routers.maya-dashboard-front.entrypoints=web"
      - "traefik.http.services.maya-dashboard-front.loadbalancer.server.port=5173"
    networks:
      - maya_network

networks:
  maya_network:
    external: true
    name: maya_network
