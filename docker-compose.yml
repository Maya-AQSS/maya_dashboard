services:

  # ─── Frontend (React 19 + Vite 7) ────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: maya_dashboard_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://maya_authorization_api.localhost}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://keycloak.localhost}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-maya}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-maya-dashboard}
    volumes:
      - .:/app
      - ../maya_infra/packages:/packages
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5175}:5173"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.maya-dashboard.rule=Host(`maya_dashboard.localhost`)"
      - "traefik.http.routers.maya-dashboard.entrypoints=web"
      - "traefik.http.services.maya-dashboard.loadbalancer.server.port=5173"
    networks:
      - maya_network

networks:
  maya_network:
    external: true
    name: maya_network
